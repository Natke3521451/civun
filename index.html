<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Civun — By NK Group</title>
  <meta name="description" content="Civun by NK Group. From Uniform To Suit. Coming Soon." />
  <meta property="og:title" content="Civun — By NK Group" />
  <meta property="og:description" content="From Uniform To Suit. Coming Soon." />
  <meta property="og:url" content="https://civun.co.il" />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --navy: #0d1b2e;
      --navy-mid: #162844;
      --off-white: #f4f1eb;
      --text-muted: #8a9bb0;
    }

    html, body {
      height: 100%;
      background: var(--navy);
      color: var(--off-white);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* Background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(201,168,76,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
    }

    /* Top line */
    .top-line {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    /* Logo mark */
    .logo-mark {
      width: 72px;
      height: 72px;
      border: 1.5px solid var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.1s;
      position: relative;
    }

    .logo-mark::before {
      content: '';
      position: absolute;
      inset: 5px;
      border: 0.5px solid rgba(201,168,76,0.3);
      border-radius: 50%;
    }

    .logo-mark svg {
      width: 32px;
      height: 32px;
    }

    /* Brand */
    .brand {
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.25s;
    }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(52px, 10vw, 88px);
      font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--off-white);
      line-height: 1;
      margin-bottom: 6px;
    }

    .brand-name span {
      color: var(--gold);
    }

    .brand-by {
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 48px;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 340px;
      margin: 0 auto 48px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.4s;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.4));
    }

    .divider-line:last-child {
      background: linear-gradient(90deg, rgba(201,168,76,0.4), transparent);
    }

    .divider-diamond {
      width: 6px;
      height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    /* Tagline */
    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(18px, 4vw, 26px);
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.06em;
      color: var(--off-white);
      text-align: center;
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.5s;
    }

    /* Coming soon badge */
    .coming-soon {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid rgba(201,168,76,0.35);
      padding: 8px 20px;
      margin-top: 32px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.65s;
    }

    /* Footer */
    .footer {
      position: absolute;
      bottom: 28px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.9s;
    }

    .footer a {
      color: var(--text-muted);
      text-decoration: none;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="top-line"></div>
  <div class="wrapper">

    <div class="logo-mark">
      <!-- Abstract C mark -->
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M22 9.5A9 9 0 1 0 22 22.5" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M19 13.5A4.5 4.5 0 1 0 19 18.5" stroke="#c9a84c" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
      </svg>
    </div>

    <div class="brand">
      <div class="brand-name"><span>C</span>IVUN</div>
      <div class="brand-by">By NK Group</div>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
    </div>

    <div class="tagline">From Uniform To Suit</div>

    <div class="coming-soon">Coming Soon</div>

    <div class="footer">
      <a href="https://civun.co.il">civun.co.il</a> &nbsp;·&nbsp; © 2026 NK Group
    </div>

  </div>
</body>
</html>
